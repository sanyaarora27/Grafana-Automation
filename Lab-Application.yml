
AWSTemplateFormatVersion: "2010-09-09"
Description: 
  Lab Application Stack, provisions the Grafana EC2 server (t3.micro,
  Amazon Linux 2023) inside the network created by Lab-Network.yml.
# ─────────────────────────────────────────────
#  Parameters
# ─────────────────────────────────────────────
Parameters:
 
  LatestAmazonLinux2023AmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
    Description: >
      Automatically resolves to the latest Amazon Linux 2023 AMI ID in the
      current region.  Override only if you need a specific AMI.
 
# ─────────────────────────────────────────────
#  Resources
# ─────────────────────────────────────────────
Resources:
 
  # ── Security Group ────────────────────────────
  GrafanaSecurityGroup: #(Lab Security Group)
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow SSH and Grafana access
      VpcId: !ImportValue LabVpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
          Description: SSH access
        - IpProtocol: tcp
          FromPort: 3000
          ToPort: 3000
          CidrIp: 0.0.0.0/0
          Description: Grafana web interface
      Tags:
        - Key: Name
          Value: lab-grafana-sg
 
  # ── EC2 Instance ──────────────────────────────
  GrafanaEC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref LatestAmazonLinux2023AmiId #Replace with id#
      InstanceType: t3.micro
      KeyName: vockey
      SubnetId: !ImportValue LabPublicSubnetId 
      #one more way to write this: 
      #SubnetId: 
        #Fn:: ImportValue: LabPublicSubnetId
      SecurityGroupIds:
        - !Ref GrafanaSecurityGroup
      Tags:
        - Key: Name
          Value: Grafana
      UserData:
        Fn::Base64: |
          #!/bin/bash
          # ── System update ──────────────────────────
          yum update -y
 
          # ── Install Grafana Enterprise ─────────────
          yum install -y https://dl.grafana.com/grafana-enterprise/release/12.2.1/grafana-enterprise_12.2.1_18655849634_linux_amd64.rpm
 
          # ── Enable and start Grafana service ───────
          systemctl enable grafana-server.service
          systemctl start  grafana-server.service
 
          # ── (Placeholder) Minikube installation ────
          # Additional Minikube setup commands can be
          # appended here by Member 2 (Compute).
 
# ─────────────────────────────────────────────
#  Outputs
# ─────────────────────────────────────────────
Outputs:
 
  GrafanaInstanceId:
    Description: EC2 instance ID for the Grafana server
    Value: !Ref GrafanaEC2Instance
 
  GrafanaPublicIP:
    Description: Public IP address of the Grafana server
    Value: !GetAtt GrafanaEC2Instance.PublicIp
 
  GrafanaURL:
    Description: URL to access the Grafana dashboard
    Value: !Sub "http://${GrafanaEC2Instance.PublicIp}:3000"
 